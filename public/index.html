<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>WA Truck Navigator</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; height: 100dvh; display: flex; flex-direction: column; }

    #header {
      background: #16213e;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 2px solid #e94560;
      flex-shrink: 0;
    }
    #header h1 { font-size: 17px; color: #e94560; font-weight: 700; letter-spacing: 1px; }
    #header span { font-size: 11px; color: #888; }

    #panel {
      background: #16213e;
      padding: 10px 14px;
      flex-shrink: 0;
      overflow-y: auto;
      max-height: 58vh;
    }

    .row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .field { display: flex; flex-direction: column; flex: 1; min-width: 130px; }
    label { font-size: 11px; color: #aaa; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
    input, select {
      padding: 8px 10px;
      background: #0f3460;
      border: 1px solid #334;
      border-radius: 6px;
      color: #eee;
      font-size: 14px;
      outline: none;
    }
    input:focus, select:focus { border-color: #e94560; }

    .input-wrap { position: relative; flex: 1; }
    .suggestions {
      position: absolute;
      background: #0f3460;
      border: 1px solid #334;
      border-radius: 6px;
      z-index: 3000;
      max-height: 200px;
      overflow-y: auto;
      width: 100%;
      top: 100%;
      left: 0;
    }
    .suggestions div {
      padding: 9px 12px;
      cursor: pointer;
      font-size: 13px;
      border-bottom: 1px solid #1a2a4a;
      line-height: 1.3;
    }
    .suggestions div:hover, .suggestions div:active { background: #e94560; }

    #route-btn {
      width: 100%;
      padding: 12px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      margin-top: 6px;
    }
    #route-btn:active { background: #c73652; }
    #route-btn:disabled { background: #555; cursor: not-allowed; }

    #info-bar {
      background: #0f3460;
      padding: 7px 14px;
      font-size: 13px;
      color: #ccc;
      min-height: 30px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    #info-bar .stat { color: #e94560; font-weight: 700; }

    #map { flex: 1; min-height: 180px; }

    .section-title {
      font-size: 11px;
      color: #e94560;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px;
      margin-top: 6px;
    }

    .restriction-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    .vehicle-preset {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .preset-btn {
      padding: 5px 10px;
      background: #0f3460;
      border: 1px solid #334;
      border-radius: 20px;
      color: #ccc;
      font-size: 12px;
      cursor: pointer;
    }
    .preset-btn.active { background: #e94560; border-color: #e94560; color: #fff; }

    #steps-panel {
      display: none;
      background: #0f3460;
      padding: 10px 14px;
      flex-shrink: 0;
      max-height: 28vh;
      overflow-y: auto;
      border-top: 1px solid #223;
    }
    #steps-panel h3 { font-size: 13px; color: #e94560; margin-bottom: 6px; }
    .step { font-size: 12px; padding: 4px 0; border-bottom: 1px solid #1a2a4a; color: #ccc; }
    .step span { color: #fff; }
  </style>
</head>
<body>

<div id="header">
  <h1>WA TRUCK NAVIGATOR</h1>
  <span>Heavy Vehicle Routing</span>
</div>

<div id="panel">

  <div class="section-title">Vehicle Preset</div>
  <div class="vehicle-preset">
    <button class="preset-btn" onclick="setPreset('rigid',this)">Rigid</button>
    <button class="preset-btn active" onclick="setPreset('semi',this)">Semi-Trailer</button>
    <button class="preset-btn" onclick="setPreset('bdouble',this)">B-Double</button>
    <button class="preset-btn" onclick="setPreset('roadtrain',this)">Road Train</button>
    <button class="preset-btn" onclick="setPreset('oversize',this)">Oversize</button>
  </div>

  <div class="section-title">Route</div>
  <div class="row">
    <div class="field">
      <label>From</label>
      <div class="input-wrap">
        <input id="from-input" type="text" placeholder="Start location..." autocomplete="off" />
        <div id="from-suggestions" class="suggestions" style="display:none"></div>
      </div>
    </div>
    <div class="field">
      <label>To</label>
      <div class="input-wrap">
        <input id="to-input" type="text" placeholder="Destination..." autocomplete="off" />
        <div id="to-suggestions" class="suggestions" style="display:none"></div>
      </div>
    </div>
  </div>

  <div class="section-title">Vehicle Dimensions</div>
  <div class="restriction-grid">
    <div class="field">
      <label>Width (m)</label>
      <input id="width" type="text" inputmode="decimal" value="2.5" />
    </div>
    <div class="field">
      <label>Height (m)</label>
      <input id="height" type="text" inputmode="decimal" value="4.3" />
    </div>
    <div class="field">
      <label>Length (m)</label>
      <input id="length" type="text" inputmode="decimal" value="19.0" />
    </div>
    <div class="field">
      <label>Total Weight (t)</label>
      <input id="weight" type="text" inputmode="decimal" value="42.5" />
    </div>
    <div class="field">
      <label>Axle Load (t)</label>
      <input id="axleload" type="text" inputmode="decimal" value="9.5" />
    </div>
    <div class="field">
      <label>Route Type</label>
      <select id="route-type">
        <option value="standard">Standard HGV</option>
        <option value="overheight">Over-Height / Western Power</option>
        <option value="roadtrain">Road Train Approved</option>
      </select>
    </div>
  </div>

  <button id="route-btn" onclick="getRoute()">Find Route</button>
</div>

<div id="info-bar">
  <span id="route-info">Enter origin and destination above</span>
</div>

<div id="map"></div>

<div id="steps-panel">
  <h3>Turn-by-Turn Directions</h3>
  <div id="steps-list"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ---- Map ----
const map = L.map('map', { zoomControl: true }).setView([-25.5, 122.0], 5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
}).addTo(map);

let routeLayer = null;
let fromMarker = null, toMarker = null;
let fromCoords = null, toCoords = null;

function pinIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:16px;height:16px;background:${color};border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.6)"></div>`,
    iconSize: [16,16], iconAnchor: [8,8]
  });
}

// ---- Presets ----
const PRESETS = {
  rigid:     { width:2.5,  height:4.0, length:8.0,  weight:20.0, axleload:9.5 },
  semi:      { width:2.5,  height:4.3, length:19.0, weight:42.5, axleload:9.5 },
  bdouble:   { width:2.5,  height:4.3, length:25.0, weight:62.5, axleload:9.5 },
  roadtrain: { width:2.5,  height:4.3, length:36.5, weight:90.0, axleload:9.5 },
  oversize:  { width:3.5,  height:5.5, length:30.0, weight:120.0, axleload:12.0 }
};

function setPreset(key, el) {
  const p = PRESETS[key];
  document.getElementById('width').value    = p.width;
  document.getElementById('height').value   = p.height;
  document.getElementById('length').value   = p.length;
  document.getElementById('weight').value   = p.weight;
  document.getElementById('axleload').value = p.axleload;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  if (key === 'oversize')    document.getElementById('route-type').value = 'overheight';
  else if (key === 'roadtrain') document.getElementById('route-type').value = 'roadtrain';
  else document.getElementById('route-type').value = 'standard';
}

// ---- Geocode (Nominatim) ----
let geoTimers = {};

function setupGeocode(inputId, sugId, setter, markerColor) {
  const inp = document.getElementById(inputId);
  const sug = document.getElementById(sugId);

  inp.addEventListener('input', () => {
    clearTimeout(geoTimers[inputId]);
    const q = inp.value.trim();
    if (q.length < 3) { sug.style.display = 'none'; return; }
    geoTimers[inputId] = setTimeout(async () => {
      try {
        const r = await fetch(`/api/geocode?q=${encodeURIComponent(q)}`);
        const results = await r.json();
        if (!Array.isArray(results) || !results.length) { sug.style.display = 'none'; return; }
        sug.innerHTML = '';
        results.slice(0,6).forEach(item => {
          const d = document.createElement('div');
          d.textContent = item.display_name;
          d.onclick = () => {
            inp.value = item.display_name;
            const lon = parseFloat(item.lon);
            const lat = parseFloat(item.lat);
            setter([lon, lat]);
            sug.style.display = 'none';
            const latlng = [lat, lon];
            if (inputId === 'from-input') {
              if (fromMarker) map.removeLayer(fromMarker);
              fromMarker = L.marker(latlng, {icon: pinIcon('#00d4aa')}).addTo(map).bindPopup('Start');
            } else {
              if (toMarker) map.removeLayer(toMarker);
              toMarker = L.marker(latlng, {icon: pinIcon('#e94560')}).addTo(map).bindPopup('Destination');
            }
            map.setView(latlng, 10);
          };
          sug.appendChild(d);
        });
        sug.style.display = 'block';
      } catch(e) { sug.style.display = 'none'; }
    }, 450);
  });

  document.addEventListener('click', e => {
    if (!sug.contains(e.target) && e.target !== inp) sug.style.display = 'none';
  });
}

setupGeocode('from-input', 'from-suggestions', c => fromCoords = c, '#00d4aa');
setupGeocode('to-input',   'to-suggestions',   c => toCoords = c,   '#e94560');

// ---- Routing ----

async function getRoute() {
  if (!fromCoords || !toCoords) {
    setInfo('Pick both start and destination from the suggestions.');
    return;
  }
  const btn = document.getElementById('route-btn');
  btn.disabled = true;
  btn.textContent = 'Routing...';
  setInfo('Calculating truck route...');

  const restrictions = {
    width:    parseFloat(document.getElementById('width').value),
    height:   parseFloat(document.getElementById('height').value),
    length:   parseFloat(document.getElementById('length').value),
    weight:   parseFloat(document.getElementById('weight').value),
    axleload: parseFloat(document.getElementById('axleload').value)
  };

  try {
    const res = await fetch('/api/route', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ start: fromCoords, end: toCoords, restrictions })
    });
    const data = await res.json();

    if (data.error || data.code !== 'Ok' || !data.routes || !data.routes.length) {
      const msg = data.error || 'No route found.';
      setInfo('No route found: ' + msg);
      btn.disabled = false; btn.textContent = 'Find Route';
      return;
    }

    // OSRM returns GeoJSON geometry: coordinates are [lon, lat]
    const route = data.routes[0];
    const coords = route.geometry.coordinates.map(c => [c[1], c[0]]); // flip to [lat, lon] for Leaflet
    if (routeLayer) map.removeLayer(routeLayer);
    routeLayer = L.polyline(coords, { color: '#e94560', weight: 5, opacity: 0.85 }).addTo(map);
    map.fitBounds(routeLayer.getBounds(), { padding: [30,30] });

    const dist = (route.distance / 1000).toFixed(1);
    const dur  = formatDuration(route.duration);

    const routeType = document.getElementById('route-type').value;
    const routeLabel = {
      standard: 'Standard HGV',
      overheight: 'Over-Height / Western Power',
      roadtrain: 'Road Train Approved'
    }[routeType];

    setInfo(`<span class="stat">${dist} km</span> &nbsp; <span class="stat">${dur}</span> &nbsp; ${routeLabel} | ${restrictions.width}m W / ${restrictions.height}m H / ${restrictions.length}m L / ${restrictions.weight}t`);

    // Steps — OSRM format
    const steps = (route.legs[0] && route.legs[0].steps) || [];
    if (steps.length) {
      const list = document.getElementById('steps-list');
      list.innerHTML = steps.map(s => {
        const type = s.maneuver ? (s.maneuver.modifier ? s.maneuver.type + ' ' + s.maneuver.modifier : s.maneuver.type) : 'continue';
        const name = s.name || '';
        const km = (s.distance / 1000).toFixed(2);
        return `<div class="step">${type}: <span>${name}</span> — ${km} km</div>`;
      }).join('');
      document.getElementById('steps-panel').style.display = 'block';
    }

  } catch(e) {
    setInfo('Error: ' + e.message);
  }

  btn.disabled = false;
  btn.textContent = 'Find Route';
}

function setInfo(html) {
  document.getElementById('route-info').innerHTML = html;
}

function formatDuration(s) {
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return h > 0 ? `${h}h ${m}m` : `${m} min`;
}


</script>
</body>
</html>
